  <rect x="64" y="406" width="200" height="11" rx="2" fill="#0F172A"/>
  <!-- Body text lines -->
  <rect x="64" y="430" width="464" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="64" y="446" width="440" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="64" y="462" width="400" height="8" rx="2" fill="#E2E8F0"/>
