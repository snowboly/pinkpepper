  <rect x="96" y="252" width="260" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="64" y="276" width="20" height="20" rx="10" fill="#FFF1F2"/>
  <rect x="72" y="282" width="8" height="8" rx="1" fill="#E11D48"/>
  <rect x="96" y="278" width="280" height="8" rx="2" fill="#94A3B8"/>
  <rect x="96" y="292" width="240" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="64" y="316" width="20" height="20" rx="10" fill="#FFF1F2"/>
  <rect x="72" y="322" width="8" height="8" rx="1" fill="#E11D48"/>
  <rect x="96" y="318" width="320" height="8" rx="2" fill="#94A3B8"/>
  <rect x="96" y="332" width="200" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="64" y="356" width="20" height="20" rx="10" fill="#FFF1F2"/>
  <rect x="72" y="362" width="8" height="8" rx="1" fill="#E11D48"/>
  <rect x="96" y="358" width="260" height="8" rx="2" fill="#94A3B8"/>
  <rect x="96" y="372" width="220" height="8" rx="2" fill="#E2E8F0"/>
