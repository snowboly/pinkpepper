<svg xmlns="http://www.w3.org/2000/svg" width="600" height="780" viewBox="0 0 600 780">
  <rect width="600" height="780" fill="#F8FAFC"/>
  <!-- Page shadow -->
  <rect x="44" y="44" width="512" height="692" rx="4" fill="#E2E8F0"/>
